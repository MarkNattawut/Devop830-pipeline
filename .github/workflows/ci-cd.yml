name: React App CI/CD

# กำหนดให้ Workflow ทำงานเมื่อมีการ Push โค้ดไปยัง Branch 'main'
on:
  push:
    branches:
      - main

jobs:
  build-and-push-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # เปลี่ยนจาก: your-username/your-repo-name
          # เป็น: ชื่อ Docker Hub ของคุณ
          tags: marknattawut/devop830-pipeline:latest

  deploy:
    needs: build-and-push-docker-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # สคริปต์ที่จะไปรันบนเซิร์ฟเวอร์ของคุณเพื่อดึง Image ใหม่มาเปิด
          script: |
            docker pull marknattawut/devop830-pipeline:latest
            docker stop sizentag-app || true
            docker rm sizentag-app || true
            docker run -d --name sizentag-app -p 80:4000 marknattawut/devop830-pipeline:latest
